<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>オフライン — PWA Template</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .offline-content {
            max-width: 400px;
        }

        .offline-icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        p {
            color: #8888aa;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .retry-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="offline-content">
        <div class="offline-icon">📡</div>
        <h1>オフラインです</h1>
        <p>インターネット接続がありません。接続を確認してから再試行してください。</p>
        <a href="/" class="retry-btn">再試行</a>
    </div>
</body>

</html>
